<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development Course | Sign up Form</title>
    <link rel="stylesheet" href="form.css">
</head>

<body>

    <main>

        <form action="/action.php">


            <!-- Select -->
            <div class="opt">

                <label for="place">Select your place :</label>

                <!-- <p id="chan">Select your place :</p> -->



                <select id="place" name="place">
                    <option value="Bangladesh">Bangladesh</option>
                    <option value="India">India</option>
                    <option value="Dhaka">Dhaka</option>
                    <option value="Singapore">Singapore</option>
                    <option value="Rajshahi">Rajshahi</option>
                </select>

            </div>



            <!-- Inputs -->
            <div class="container">


                <div class="field">
                    <input type="email" name="email" placeholder="Write your Gmail account" required>
                </div>


                <div class="field">
                    <input type="text" name="username" placeholder="Write your username" required>
                </div>



                <div class="field">
                    <input type="password" name="password" placeholder="write your password here">
                </div>


                <div class="field">
                    <textarea name="bio" placeholder="Write a short bio about yourself" rows="5"></textarea>
                </div>


                <div class="field">
                    <input type="submit" value="Submit">
                </div>


            </div>

        </form>

    </main>

</body>

</html>
